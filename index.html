<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання 3: Діапазон чисел у консоль</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="card">
        <h2>Числа від A до B</h2>
        <div class="input-field">
            <label for="inputA">Число A:</label>
            <input type="number" id="inputA" placeholder="Наприклад: 5">
        </div>
        <div class="input-field">
            <label for="inputB">Число B:</label>
            <input type="number" id="inputB" placeholder="Наприклад: 12">
        </div>
        <button id="logBtn">Вивести в консоль</button>
        <div class="result-box">
            <p style="font-size: 0.9rem; color: #777;">Результат виводиться в консоль розробника (F12 -> Console)</p>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
